# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - web-app-harry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: testing
        run: |
          docker run \
            --rm \
            -u $(id -u):$(id -g) \
            -e DOTNET_CLI_HOME=/tmp/dotnet-home \
            -e HOME=/tmp \
            -e NUGET_PACKAGES=/tmp/nuget-packages \
            -v .:/app \
            -w /app \
            mcr.microsoft.com/dotnet/sdk:10.0 \
              dotnet test tests/tests.csproj

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4837D94A712E49838FECE7CCFB392D7C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_C4A97ABBBE31476DB392F02670348414 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4837D94A712E49838FECE7CCFB392D7C }}/in-class:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: [ build, test ]
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'web-app-harry'
          slot-name: 'Production'
          images: 'docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4837D94A712E49838FECE7CCFB392D7C }}/in-class:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BF5DDF1E99A2445081447399A33D9C19 }}